<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ivoire Chess Club - Classement Live</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <header class="header">
      <div>
        <p class="eyebrow">Ivoire Chess Club</p>
        <h1>Classement live partagé</h1>
      </div>
      <div class="header-actions">
        <button id="refresh-btn" class="btn">Rafraîchir</button>
        <button id="admin-toggle-btn" class="btn btn-secondary">Admin</button>
      </div>
    </header>

    <section class="card">
      <div class="toolbar">
        <div class="tabs" role="tablist" aria-label="Mode de jeu">
          <button class="tab active" data-mode="rapid">Rapid</button>
          <button class="tab" data-mode="blitz">Blitz</button>
          <button class="tab" data-mode="bullet">Bullet</button>
        </div>
        <p id="last-sync">Dernière synchro: -</p>
      </div>
      <div id="status" class="status info">Chargement des données...</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Joueur</th>
              <th>Pseudo Chess.com</th>
              <th>Elo</th>
              <th>Parties</th>
            </tr>
          </thead>
          <tbody id="ranking-body"></tbody>
        </table>
      </div>
    </section>

    <section id="admin-panel" class="card hidden">
      <h2>Panneau admin</h2>
      <div id="admin-status" class="status info">Connectez-vous pour écrire dans Supabase.</div>

      <form id="login-form" class="panel-grid">
        <label>Email admin
          <input id="admin-email" type="email" required placeholder="admin@club.com" />
        </label>
        <label>Mot de passe
          <input id="admin-password" type="password" required placeholder="********" />
        </label>
        <button class="btn" type="submit">Se connecter</button>
        <button class="btn btn-secondary" id="logout-btn" type="button">Se déconnecter</button>
      </form>

      <hr />

      <form id="add-player-form" class="panel-grid">
        <label>Username Chess.com
          <input id="player-username" type="text" required placeholder="magnuscarlsen" />
        </label>
        <label>Nom affiché
          <input id="player-display-name" type="text" required placeholder="Magnus Carlsen" />
        </label>
        <label>Club
          <input id="player-club" type="text" value="Ivoire Chess Club" />
        </label>
        <button class="btn" type="submit">Ajouter un joueur</button>
      </form>

      <form id="top-limit-form" class="panel-inline">
        <label>Top limit partagé
          <input id="top-limit-input" type="number" min="1" max="100" required />
        </label>
        <button class="btn" type="submit">Mettre à jour</button>
      </form>

      <h3>Gestion des joueurs</h3>
      <ul id="admin-player-list" class="player-list"></ul>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
